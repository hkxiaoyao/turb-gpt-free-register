<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>授权码登录</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef3f8;
      color: #172033;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      width: min(420px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid #d9e2ec;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(15, 23, 42, .14);
    }
    h1 { margin: 0 0 14px; font-size: 22px; }
    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 9px 12px;
      font: inherit;
    }
    button {
      width: 100%;
      min-height: 42px;
      margin-top: 14px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    .err {
      margin: 0 0 12px;
      padding: 9px 12px;
      border: 1px solid #f3b4af;
      border-radius: 8px;
      background: #fff0ef;
      color: #b3261e;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="{{ login_url }}">
    <h1>授权码登录</h1>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <input name="auth_code" type="password" autocomplete="current-password" autofocus placeholder="授权码">
    <input name="next" type="hidden" value="{{ next_url }}">
    <button type="submit">登录</button>
  </form>
</body>
</html>
